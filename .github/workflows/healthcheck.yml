name: Health Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Check backend /health
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 https://wrapped-backend.onrender.com/health || echo "000")
          echo "Backend /health status: $status"
          if [ "$status" != "200" ]; then
            echo "::error::Backend health check failed (HTTP $status)"
            exit 1
          fi

      - name: Check frontend availability
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 -L https://movieswrapped.netlify.app/ || echo "000")
          echo "Frontend status: $status"
          if [ "$status" != "200" ]; then
            echo "::error::Frontend health check failed (HTTP $status)"
            exit 1
          fi

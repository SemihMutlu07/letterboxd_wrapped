C2 — Fullscreen button çalışmıyor
═══════════════════════════════════════════════════════════
ShareModal.tsx'te maximize icon'a tıklanınca hiçbir şey olmuyor.

Fix:
  const cardRef = useRef<HTMLDivElement>(null);
  const [isFs, setIsFs] = useState(false);

  const toggleFs = async () => {
    if (!cardRef.current) return;
    if (!document.fullscreenElement) {
      try { await cardRef.current.requestFullscreen(); setIsFs(true); }
      catch (e) { console.warn('fullscreen denied', e); }
    } else {
      await document.exitFullscreen(); setIsFs(false);
    }
  };

  useEffect(() => {
    const h = () => setIsFs(!!document.fullscreenElement);
    document.addEventListener('fullscreenchange', h);
    return () => document.removeEventListener('fullscreenchange', h);
  }, []);

cardRef'i share card wrapper div'ine bağla. Fullscreen butonuna onClick={toggleFs}.
iOS Safari: webkitRequestFullscreen fallback ekle veya mobile'da butonu gizle.

<script>
function cp(btn) {
  const ta = btn.nextElementSibling;
  navigator.clipboard.writeText(ta.value).then(() => {
    btn.textContent = '✓';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('ok'); }, 1600);
  });
}
</script>
